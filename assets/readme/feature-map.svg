<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">勇哥餐饮问诊 Skill 功能地图</title>
  <desc id="desc">展示从用户输入到追问、算账、检索案例、联网核验、给出止损建议的流程。</desc>
  <rect width="1280" height="720" fill="#f7f4ec"/>
  <text x="640" y="72" text-anchor="middle" font-family="Arial, 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="42" font-weight="800" fill="#12231f">从一句“怎么救”到一套止损方案</text>
  <text x="640" y="114" text-anchor="middle" font-family="Arial, 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="22" fill="#5f6b65">按公开视频方法蒸馏：先追问，再算账，再核验，最后给动作</text>

  <g font-family="Arial, 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif">
    <g transform="translate(64 174)">
      <rect width="216" height="340" rx="16" fill="#10221e"/>
      <text x="108" y="44" text-anchor="middle" font-size="25" font-weight="800" fill="#f2aa4c">用户输入</text>
      <text x="28" y="96" font-size="20" fill="#ffffff">月亏 1.5 万</text>
      <text x="28" y="142" font-size="20" fill="#ffffff">想加盟奶茶</text>
      <text x="28" y="188" font-size="20" fill="#ffffff">上传店铺照片</text>
      <text x="28" y="234" font-size="20" fill="#ffffff">想接盘转让店</text>
      <text x="28" y="280" font-size="20" fill="#ffffff">总部不退款</text>
    </g>

    <path d="M300 344 H386" stroke="#163832" stroke-width="6" stroke-linecap="round"/>
    <path d="M376 326 L406 344 L376 362 Z" fill="#163832"/>

    <g transform="translate(410 150)">
      <rect width="210" height="92" rx="14" fill="#ffffff" stroke="#c9d8ce" stroke-width="2"/>
      <text x="105" y="39" text-anchor="middle" font-size="23" font-weight="800" fill="#173b35">追问关键数</text>
      <text x="105" y="70" text-anchor="middle" font-size="18" fill="#607067">租金 · 人工 · 流水 · 毛利</text>
    </g>
    <g transform="translate(410 276)">
      <rect width="210" height="92" rx="14" fill="#ffffff" stroke="#c9d8ce" stroke-width="2"/>
      <text x="105" y="39" text-anchor="middle" font-size="23" font-weight="800" fill="#173b35">算保本线</text>
      <text x="105" y="70" text-anchor="middle" font-size="18" fill="#607067">日保本 · runway · 差额</text>
    </g>
    <g transform="translate(410 402)">
      <rect width="210" height="92" rx="14" fill="#ffffff" stroke="#c9d8ce" stroke-width="2"/>
      <text x="105" y="39" text-anchor="middle" font-size="23" font-weight="800" fill="#173b35">检索案例</text>
      <text x="105" y="70" text-anchor="middle" font-size="18" fill="#607067">504 条 reviewed notes</text>
    </g>

    <path d="M640 344 H726" stroke="#163832" stroke-width="6" stroke-linecap="round"/>
    <path d="M716 326 L746 344 L716 362 Z" fill="#163832"/>

    <g transform="translate(758 150)">
      <rect width="212" height="92" rx="14" fill="#173b35"/>
      <text x="106" y="39" text-anchor="middle" font-size="23" font-weight="800" fill="#ffffff">品牌资质</text>
      <text x="106" y="70" text-anchor="middle" font-size="18" fill="#d8eee4">备案 · 商标 · 主体</text>
    </g>
    <g transform="translate(758 276)">
      <rect width="212" height="92" rx="14" fill="#f2aa4c"/>
      <text x="106" y="39" text-anchor="middle" font-size="23" font-weight="800" fill="#12231f">点位诊断</text>
      <text x="106" y="70" text-anchor="middle" font-size="18" fill="#50310f">门头 · 动线 · 竞品</text>
    </g>
    <g transform="translate(758 402)">
      <rect width="212" height="92" rx="14" fill="#173b35"/>
      <text x="106" y="39" text-anchor="middle" font-size="23" font-weight="800" fill="#ffffff">合同纠纷</text>
      <text x="106" y="70" text-anchor="middle" font-size="18" fill="#d8eee4">止血 · 固证 · 协商</text>
    </g>

    <path d="M990 344 H1076" stroke="#163832" stroke-width="6" stroke-linecap="round"/>
    <path d="M1066 326 L1096 344 L1066 362 Z" fill="#163832"/>

    <g transform="translate(1000 210)">
      <rect width="218" height="268" rx="18" fill="#ffffff" stroke="#163832" stroke-width="3"/>
      <text x="109" y="48" text-anchor="middle" font-size="26" font-weight="800" fill="#173b35">输出建议</text>
      <text x="30" y="98" font-size="20" fill="#173b35">该救：7/14/30 天测试</text>
      <text x="30" y="140" font-size="20" fill="#173b35">该转：列出转让条件</text>
      <text x="30" y="182" font-size="20" fill="#173b35">该关：锁定止损窗口</text>
      <text x="30" y="224" font-size="20" fill="#173b35">该查：先核验再付款</text>
    </g>
  </g>
</svg>
